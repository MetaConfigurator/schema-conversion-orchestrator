apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-converter
  namespace: schema-converter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-converter
  template:
    metadata:
      labels:
        app: node-converter
    spec:
      containers:
        - name: node-converter
          image: your-dockerhub-user/node-converter:latest
          ports:
            - containerPort: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
