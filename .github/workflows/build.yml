name: Build Schema Converters

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-node:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: external_converters/node/package-lock.json

    - name: Install Node.js dependencies
      working-directory: external_converters/node
      run: npm ci

    - name: Build TypeScript
      working-directory: external_converters/node
      run: npm run build

    - name: Test Node.js converter
      working-directory: external_converters/node
      run: |
        echo '{"sourceFormat":"SHACL","targetFormat":"JsonSchema","schema":"test schema"}' > test.json
        node converter.js convert test.json
        node converter.js list

    - name: Upload Node.js artifacts
      uses: actions/upload-artifact@v4
      with:
        name: node-converter
        path: |
          external_converters/node/*.js
          external_converters/node/converters/*.js
          external_converters/node/package.json

  build-java:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

    - name: Build with Maven
      working-directory: external_converters/java
      run: mvn clean compile package

    - name: Test Java converter
      working-directory: external_converters/java
      run: |
        echo '{"sourceFormat":"XSD","targetFormat":"DTD","schema":"test schema"}' > test.json
        java -jar converter.jar convert test.json
        java -jar converter.jar list

    - name: Upload Java artifacts
      uses: actions/upload-artifact@v4
      with:
        name: java-converter
        path: |
          external_converters/java/converter.jar

  test-integration:
    needs: [build-node, build-java]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Set up Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Download Node.js artifacts
      uses: actions/download-artifact@v4
      with:
        name: node-converter
        path: external_converters/node/

    - name: Download Java artifacts
      uses: actions/download-artifact@v4
      with:
        name: java-converter
        path: external_converters/java/

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask requests

    - name: Make converters executable
      run: |
        chmod +x external_converters/node/converter.js
        chmod +x external_converters/java/converter.jar

    - name: Test integration
      run: |
        # Start the Flask app in background
        python app.py &
        FLASK_PID=$!
        
        # Wait for Flask to start
        sleep 5
        
        # Test health endpoint
        curl -f http://localhost:5002/health || exit 1
        
        # Test converters list
        curl -f http://localhost:5002/converters || exit 1
        
        # Test conversion (if converters are available)
        curl -f -X POST http://localhost:5002/convert \
          -H "Content-Type: application/json" \
          -d '{"sourceFormat":"SHACL","targetFormat":"JsonSchema","schema":"test schema"}' || echo "No SHACL->JsonSchema converter available"
        
        # Kill Flask app
        kill $FLASK_PID

  build-docker:
    needs: [build-node, build-java]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download Node.js artifacts
      uses: actions/download-artifact@v4
      with:
        name: node-converter
        path: external_converters/node/

    - name: Download Java artifacts
      uses: actions/download-artifact@v4
      with:
        name: java-converter
        path: external_converters/java/

    - name: Build Docker image
      run: docker build -t schema-converter:latest .

    - name: Test Docker image
      run: |
        docker run --rm -d -p 5002:5002 --name test-converter schema-converter:latest
        sleep 10
        curl -f http://localhost:5002/health || exit 1
        docker stop test-converter

    - name: Save Docker image
      if: github.ref == 'refs/heads/main'
      run: |
        docker save schema-converter:latest | gzip > schema-converter.tar.gz

    - name: Upload Docker image artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: schema-converter.tar.gz